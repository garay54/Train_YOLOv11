name: Repository checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify portfolio files
        run: |
          test -s README.md
          test -s LICENSE
      - name: Compile Python files
        run: python -m compileall -q .

